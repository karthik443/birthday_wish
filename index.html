<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lego Flower Garden</title>
  <style>
    :root {
      --border: 2px solid #1a1a1a;
      --lego-red: #c4281b;
      --lego-yellow: #f5cd2f;
      --lego-white: #f4f4f4;
      --lego-black: #1a1a1a;
      --pink-dress: #f48fb1;
      --skin: #ffcc80;
      --hair-black: #1a1a1a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; min-height:100dvh;
      overflow:hidden;
      touch-action:none;
      -webkit-user-select:none; user-select:none;
      font-family:'Courier New',monospace;
    }

    #scene {
      width:100vw; height:100vh; height:100dvh;
      position:relative; overflow:hidden;
      background:linear-gradient(180deg,#3a9bd4 0%,#7ec8e3 40%,#b8e4f0 70%,#d4f0fc 100%);
    }

    /* SUN with visible rays */
    .sun {
      position:absolute; top:4%; left:5%;
      width:8vw; height:8vw; max-width:60px; max-height:60px;
      background:radial-gradient(circle,#fff9c4 20%,#ffee58 60%,#f5cd2f 100%);
      border:3px solid #f9a825; border-radius:50%;
      box-shadow:0 0 30px rgba(255,235,59,0.6), 0 0 60px rgba(255,235,59,0.3);
      z-index:1;
    }
    .sun-ray {
      position:absolute; background:#f5cd2f;
      border-radius:2px;
    }
    .ray-v { width:4px; left:calc(50% - 2px); }
    .ray-h { height:4px; top:calc(50% - 2px); }
    .ray-d { width:4px; border-radius:2px; transform-origin:center; }

    /* Clouds */
    .cloud {
      position:absolute;
      background:var(--lego-white); border:var(--border);
      border-radius:3px; opacity:0.85;
    }

    /* Ground */
    #ground {
      position:absolute; bottom:0; width:100%; height:22%;
      background:linear-gradient(180deg,#43a047 0%,#388e3c 30%,#2e7d32 60%,#5d4037 80%,#4e342e 100%);
      border-top:3px solid #2e7d32;
    }
    #grass-layer {
      position:absolute; bottom:16%; width:100%; height:6%;
      pointer-events:none; z-index:2;
    }
    .grass-blade {
      position:absolute; bottom:0; width:2px;
      border-radius:2px 2px 0 0; transform-origin:bottom center;
    }
    @keyframes grassSway { 0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);} }

    /* Trees */
    .tree { position:absolute; bottom:16%; z-index:1; }
    .tree .trunk {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      background:linear-gradient(90deg,#4e342e,#6d4c41,#4e342e);
      border:var(--border); border-radius:3px;
    }
    .tree .canopy { position:absolute; left:50%; transform:translateX(-50%); }
    .tree .lc { position:absolute; border:2px solid #1b5e20; border-radius:5px; }

    /* Birds */
    @keyframes flapWings { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(-0.6);} }
    .bird { position:absolute; pointer-events:none; z-index:15; }
    .bird .wing { position:absolute; width:10px; height:4px; background:#444; border-radius:3px 3px 0 0; animation:flapWings 0.3s ease-in-out infinite; }
    .bird .wing-left { left:0; transform-origin:right center; }
    .bird .wing-right { left:12px; transform-origin:left center; animation-delay:0.05s; }
    .bird .b-body { position:absolute; left:8px; top:2px; width:6px; height:4px; background:#444; border-radius:50%; }

    /* Flower bed */
    #flower-bed { position:absolute; bottom:2%; left:0; width:100%; height:20%; pointer-events:none; z-index:3; }
    .flower { position:absolute; bottom:0; transform-origin:bottom center; }
    .flower .stem { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:3px; background:linear-gradient(90deg,#2e7d32,#43a047,#2e7d32); border:1px solid #1b5e20; border-radius:1px; }
    .flower .leaf { position:absolute; width:7px; height:5px; background:#66bb6a; border:1px solid #2e7d32; border-radius:50% 0 50% 0; }
    .flower .petal { position:absolute; width:8px; height:8px; border:1px solid rgba(0,0,0,0.25); border-radius:50%; box-shadow:inset 0 1px 2px rgba(255,255,255,0.4); }

    /* Characters - bigger for mobile visibility */
    .character {
      position:absolute; bottom:22%;
      width:10%; max-width:70px;
      aspect-ratio:2/3;
      z-index:5; transition:transform 0.05s;
    }
    .character .head {
      width:62%; height:40%; border:var(--border);
      position:absolute; top:0; left:19%;
      background:var(--skin); border-radius:6px;
    }
    .character .eye {
      width:15%; height:14%; background:var(--lego-black);
      position:absolute; top:28%; border-radius:50%;
    }
    .character .left-eye { left:20%; }
    .character .right-eye { right:20%; }
    .character .eye-shine {
      position:absolute; width:35%; height:35%;
      background:white; border-radius:50%; top:8%; right:8%;
    }
    .character .mouth { position:absolute; bottom:16%; left:50%; transform:translateX(-50%); }
    .character .blush {
      position:absolute; width:18%; height:10%;
      background:#e57373; border-radius:50%;
      top:52%; opacity:0.5;
      transition:opacity 0.3s, background 0.3s, width 0.3s;
    }
    .character .blush-left { left:6%; }
    .character .blush-right { right:6%; }
    .character .hair { position:absolute; background:var(--hair-black); border:1px solid #000; }
    .character .torso { width:56%; height:24%; border:var(--border); position:absolute; top:40%; left:22%; }
    .character .arm { width:15%; height:22%; border:var(--border); position:absolute; top:42%; border-radius:0 0 3px 3px; }
    .character .left-arm { left:7%; }
    .character .right-arm { right:7%; }
    .character .hand { width:13%; height:8%; background:var(--skin); border:var(--border); position:absolute; top:62%; border-radius:50%; }
    .character .left-hand { left:8%; }
    .character .right-hand { right:8%; }
    .character .legs { position:absolute; top:64%; left:22%; width:56%; height:36%; }
    .character .leg { width:42%; height:65%; border:var(--border); position:absolute; bottom:0; border-radius:0 0 3px 3px; }
    .character .left-leg { left:4%; }
    .character .right-leg { right:4%; }
    .character .shoe { position:absolute; bottom:0; width:100%; height:26%; border:var(--border); border-radius:0 0 3px 3px; }

    /* Boy */
    #boy .torso { background:var(--lego-red); }
    #boy .arm { background:var(--lego-red); }
    #boy .leg { background:#c4a55a; height:50%; }
    #boy .shoe { background:#5d4037; }
    #boy .hair-top { top:-14%; left:8%; width:84%; height:18%; border-radius:4px 4px 0 0; }
    #boy .hair-fringe { top:0; left:8%; width:34%; height:16%; }

    /* Girl - PINK DRESS, longer skirt, cuter */
    #girl { width:9%; max-width:62px; }
    #girl .head { border-radius:8px; }
    #girl .eye { width:16%; height:16%; }
    #girl .torso { background:var(--pink-dress); width:50%; left:25%; }
    #girl .arm { background:var(--pink-dress); width:13%; }
    #girl .leg { background:var(--skin); height:40%; width:38%; }
    #girl .shoe { background:#e91e63; }
    #girl .skirt {
      position:absolute; top:62%; left:15%;
      width:70%; height:20%;
      background:var(--lego-red);
      border:var(--border);
      border-radius:0 0 6px 6px;
      clip-path:polygon(8% 0%,92% 0%,100% 100%,0% 100%);
    }
    #girl .hair-top { top:-14%; left:6%; width:88%; height:18%; border-radius:5px 5px 0 0; }
    #girl .hair-left { top:0; left:-7%; width:16%; height:50%; border-radius:0 0 3px 3px; }
    #girl .hair-right { top:0; right:-7%; width:16%; height:50%; border-radius:0 0 3px 3px; }
    #girl .ponytail {
      position:absolute; top:4%; right:-26%;
      width:16%; height:60%;
      background:var(--hair-black);
      border:1px solid #000;
      border-radius:0 5px 5px 0;
      transform-origin:top center;
    }
    #girl .ponytail-tie {
      position:absolute; top:4%; right:-14%;
      width:12%; height:10%;
      background:var(--lego-red);
      border:1px solid #1a1a1a; border-radius:50%;
    }
    #girl .glasses { position:absolute; top:24%; left:10%; width:80%; height:22%; }
    #girl .glasses-lens { position:absolute; width:34%; height:90%; border:2px solid #555; border-radius:3px; background:rgba(200,230,255,0.2); }
    #girl .glasses-lens-left { left:0; }
    #girl .glasses-lens-right { right:0; }
    #girl .glasses-bridge { position:absolute; top:35%; left:34%; width:32%; height:18%; background:#555; }
    #girl .legs { width:50%; left:25%; }

    /* Mouths */
    .mouth-smile { width:8px; height:3px; border-bottom:2px solid #1a1a1a; border-radius:0 0 4px 4px; }
    .mouth-grin { width:12px; height:6px; border-bottom:2px solid #1a1a1a; border-left:2px solid #1a1a1a; border-right:2px solid #1a1a1a; border-radius:0 0 7px 7px; background:#fff; }
    .mouth-shy { width:5px; height:5px; border:2px solid #1a1a1a; border-radius:50%; background:#ffcdd2; }

    /* Hug animation */
    .character.hugging { transition:left 0.4s ease; }
    .character.shy .head { background:#ffcdd2 !important; transition:background 0.3s; }
    .character.shy .blush { opacity:1 !important; background:#ef5350 !important; width:22% !important; }
    .character.shy .eye { height:6% !important; top:34% !important; border-radius:2px !important; }

    @keyframes happyJump {
      0%{transform:translateY(0);}20%{transform:translateY(-12%);}40%{transform:translateY(0);}55%{transform:translateY(-8%);}70%{transform:translateY(0);}82%{transform:translateY(-4%);}100%{transform:translateY(0);}
    }
    .happy-jump { animation:happyJump 1.2s ease-in-out; }

    @keyframes floatHeart { 0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-25px) scale(0.5);} }
    .heart { position:absolute; font-size:12px; pointer-events:none; animation:floatHeart 1.2s ease-out forwards; z-index:20; }

    @keyframes msgPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}15%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}25%{transform:translate(-50%,-50%) scale(1);}85%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);} }
    .msg-popup {
      position:absolute; top:30%; left:50%; transform:translate(-50%,-50%);
      background:rgba(255,255,255,0.95); border:3px solid #e91e63;
      border-radius:14px; padding:10px 18px;
      font-family:'Courier New',monospace; font-size:min(4vw,18px); font-weight:bold;
      color:#c2185b; white-space:nowrap; z-index:60;
      box-shadow:0 4px 16px rgba(233,30,99,0.3);
      animation:msgPop 3s ease-in-out forwards;
      pointer-events:none;
    }

    @keyframes sparkle { 0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-20px) scale(0);} }
    .sparkle { position:absolute; pointer-events:none; z-index:6; animation:sparkle 0.8s ease-out forwards; }
    .sparkle-dot { width:5px; height:5px; border-radius:50%; box-shadow:0 0 3px currentColor; }

    .butterfly { position:absolute; pointer-events:none; z-index:6; }
    .butterfly .b-wing { position:absolute; width:7px; height:5px; border-radius:50%; border:1px solid #1a1a1a; animation:flapWings 0.4s ease-in-out infinite; }
    .butterfly .b-wing-left { left:0; transform-origin:right center; }
    .butterfly .b-wing-right { left:9px; transform-origin:left center; }
    .butterfly .b-body { position:absolute; left:6px; top:1px; width:2px; height:5px; background:#333; border-radius:2px; }

    #day-counter { display:none; }

    /* HUG BUTTON inside scene */
    #hug-btn {
      display:none; position:absolute; top:6%; left:50%; transform:translateX(-50%);
      background:rgba(233,30,99,0.9); color:white;
      border:2px solid #1a1a1a; border-radius:16px;
      padding:5px 14px; font-size:min(3vw,13px); font-weight:bold;
      cursor:pointer; z-index:50;
      animation:pulse 1s ease-in-out infinite;
      -webkit-tap-highlight-color:transparent;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(233,30,99,0.4);}50%{box-shadow:0 0 0 6px rgba(233,30,99,0);} }

    /* Controls overlaid on scene at bottom */
    #mobile-controls {
      position:absolute; bottom:0; left:0; right:0;
      height:20%; min-height:80px;
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 12px;
      background:rgba(0,0,0,0.15);
      z-index:50;
      pointer-events:none;
    }
    #mobile-controls > * { pointer-events:auto; }

    .dpad { display:flex; gap:12px; flex-shrink:0; opacity:0.8; }
    .dpad-btn {
      width:36px; height:36px;
      background:rgba(255,255,255,0.7); border:2px solid rgba(0,0,0,0.5);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-size:14px; color:#333; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .dpad-btn:active { background:rgba(255,255,0,0.8); }

    .action-btns { display:flex; gap:8px; align-items:center; opacity:0.8; }
    .act-btn {
      width:40px; height:40px;
      background:rgba(255,255,255,0.7); border:2px solid rgba(0,0,0,0.5);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:8px; font-weight:bold; color:#333; cursor:pointer;
      -webkit-tap-highlight-color:transparent; text-align:center; line-height:1;
    }
    .act-btn:active { background:rgba(255,255,0,0.8); }
    .hug-mob { display:none; background:rgba(233,30,99,0.5); border-color:#c2185b; color:#fff; }
    .hug-mob.visible { display:flex; }

    /* Desktop: show text instructions, hide overlay dpad */
    @media (min-width:821px) {
      #scene { width:800px; height:500px; max-width:100vw; max-height:80vh; border:4px solid #1a1a1a; border-radius:4px; }
      #mobile-controls { display:none; }
      body { background:#1a2a1a; }
    }
    @media (max-width:820px) {
      #scene { width:100vw; height:100vh; height:100dvh; }
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Sun with visible rays -->
    <div class="sun">
      <div class="sun-ray ray-v" style="height:16px;top:-20px;"></div>
      <div class="sun-ray ray-v" style="height:16px;bottom:-20px;"></div>
      <div class="sun-ray ray-h" style="width:16px;left:-20px;"></div>
      <div class="sun-ray ray-h" style="width:16px;right:-20px;"></div>
      <div class="sun-ray ray-d" style="width:4px;height:12px;top:-16px;left:4px;transform:rotate(-35deg);"></div>
      <div class="sun-ray ray-d" style="width:4px;height:12px;top:-16px;right:4px;transform:rotate(35deg);"></div>
      <div class="sun-ray ray-d" style="width:4px;height:12px;bottom:-16px;left:4px;transform:rotate(35deg);"></div>
      <div class="sun-ray ray-d" style="width:4px;height:12px;bottom:-16px;right:4px;transform:rotate(-35deg);"></div>
    </div>

    <div class="cloud" style="left:20%;top:8%;width:10%;height:4%;"></div>
    <div class="cloud" style="left:55%;top:5%;width:8%;height:3.5%;"></div>
    <div class="cloud" style="left:78%;top:12%;width:9%;height:3.5%;"></div>

    <!-- Trees -->
    <div class="tree" style="left:2%;">
      <div class="trunk" style="width:14px;height:60px;"></div>
      <div class="canopy" style="bottom:50px;">
        <div class="lc" style="width:44px;height:36px;background:#2e7d32;left:-22px;top:0;"></div>
        <div class="lc" style="width:34px;height:28px;background:#388e3c;left:-4px;top:-16px;"></div>
        <div class="lc" style="width:28px;height:24px;background:#43a047;left:-24px;top:-8px;"></div>
      </div>
    </div>
    <div class="tree" style="left:14%;">
      <div class="trunk" style="width:10px;height:45px;"></div>
      <div class="canopy" style="bottom:38px;">
        <div class="lc" style="width:32px;height:26px;background:#388e3c;left:-16px;top:0;"></div>
        <div class="lc" style="width:24px;height:20px;background:#4caf50;left:-2px;top:-12px;"></div>
      </div>
    </div>
    <div class="tree" style="right:10%;left:auto;">
      <div class="trunk" style="width:12px;height:52px;"></div>
      <div class="canopy" style="bottom:44px;">
        <div class="lc" style="width:38px;height:32px;background:#2e7d32;left:-19px;top:0;"></div>
        <div class="lc" style="width:30px;height:26px;background:#388e3c;left:-3px;top:-14px;"></div>
        <div class="lc" style="width:26px;height:22px;background:#43a047;left:-22px;top:-6px;"></div>
      </div>
    </div>
    <div class="tree" style="right:1%;left:auto;">
      <div class="trunk" style="width:10px;height:40px;"></div>
      <div class="canopy" style="bottom:34px;">
        <div class="lc" style="width:30px;height:24px;background:#388e3c;left:-15px;top:0;"></div>
        <div class="lc" style="width:22px;height:18px;background:#4caf50;left:-1px;top:-10px;"></div>
      </div>
    </div>

    <div id="ground"></div>
    <div id="grass-layer"></div>
    <div id="flower-bed"></div>

    <!-- Boy -->
    <div id="boy" class="character" style="left:-12%;">
      <div class="head">
        <div class="hair hair-top"></div>
        <div class="hair hair-fringe"></div>
        <div class="eye left-eye"><div class="eye-shine"></div></div>
        <div class="eye right-eye"><div class="eye-shine"></div></div>
        <div class="blush blush-left"></div>
        <div class="blush blush-right"></div>
        <div class="mouth mouth-smile"></div>
      </div>
      <div class="arm left-arm"></div>
      <div class="arm right-arm"></div>
      <div class="hand left-hand"></div>
      <div class="hand right-hand"></div>
      <div class="torso"></div>
      <div class="legs">
        <div class="leg left-leg"><div class="shoe"></div></div>
        <div class="leg right-leg"><div class="shoe"></div></div>
      </div>
    </div>

    <!-- Girl -->
    <div id="girl" class="character" style="left:62%;">
      <div class="head">
        <div class="hair hair-top"></div>
        <div class="hair hair-left"></div>
        <div class="hair hair-right"></div>
        <div class="ponytail"></div>
        <div class="ponytail-tie"></div>
        <div class="glasses">
          <div class="glasses-lens glasses-lens-left"></div>
          <div class="glasses-lens glasses-lens-right"></div>
          <div class="glasses-bridge"></div>
        </div>
        <div class="eye left-eye"><div class="eye-shine"></div></div>
        <div class="eye right-eye"><div class="eye-shine"></div></div>
        <div class="blush blush-left"></div>
        <div class="blush blush-right"></div>
        <div class="mouth mouth-smile"></div>
      </div>
      <div class="arm left-arm"></div>
      <div class="arm right-arm"></div>
      <div class="hand left-hand"></div>
      <div class="hand right-hand"></div>
      <div class="torso"></div>
      <div class="skirt"></div>
      <div class="legs">
        <div class="leg left-leg"><div class="shoe"></div></div>
        <div class="leg right-leg"><div class="shoe"></div></div>
      </div>
    </div>

    <div id="hug-btn">HUG</div>
    <div id="day-counter"></div>

    <!-- Controls overlaid at bottom -->
    <div id="mobile-controls">
      <div class="dpad">
        <div class="dpad-btn dpad-left" data-dir="left">&#9664;</div>
        <div class="dpad-btn dpad-right" data-dir="right">&#9654;</div>
      </div>
      <div class="action-btns">
        <div class="act-btn hug-mob" id="hug-mob">HUG</div>
        <div class="act-btn jump-btn">JUMP</div>
      </div>
    </div>
  </div>

  <script>
    var START_DATE = new Date('2026-05-24');

    var FLOWER_TYPES = [
      {name:'tulip',stemH:18,color:'#e53935',shape:'tulip'},
      {name:'rose',stemH:16,color:'#f48fb1',shape:'rose'},
      {name:'daisy',stemH:20,color:'#fff9c4',center:'#fdd835',shape:'daisy'},
      {name:'sunflower',stemH:22,color:'#fdd835',center:'#5d4037',shape:'sunflower'},
      {name:'bluebell',stemH:16,color:'#42a5f5',shape:'bell'},
      {name:'lavender',stemH:20,color:'#ab47bc',shape:'spike'},
      {name:'marigold',stemH:15,color:'#ff9800',shape:'pom'},
      {name:'lily',stemH:18,color:'#fff3e0',center:'#66bb6a',shape:'star'},
      {name:'orchid',stemH:16,color:'#ce93d8',shape:'orchid'},
      {name:'carnation',stemH:18,color:'#ef5350',shape:'ruffle'},
      {name:'daffodil',stemH:20,color:'#fff176',center:'#ff8a00',shape:'trumpet'},
      {name:'violet',stemH:14,color:'#7e57c2',shape:'round'}
    ];

    function seededRandom(s){var x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x);}
    function getDayCount(){var t=new Date();t.setHours(0,0,0,0);var s=new Date(START_DATE);s.setHours(0,0,0,0);return Math.max(1,Math.floor((t-s)/86400000)+1);}

    function createFlower(ti,xPos){
      var t=FLOWER_TYPES[ti%FLOWER_TYPES.length],f=document.createElement('div');
      f.className='flower';f.style.left=xPos+'px';
      var st=document.createElement('div');st.className='stem';st.style.height=t.stemH+'px';f.appendChild(st);
      var ls=seededRandom(ti*7)>0.5?-5:5,lf=document.createElement('div');
      lf.className='leaf';lf.style.bottom=(t.stemH*0.4)+'px';lf.style.left='calc(50% + '+ls+'px)';f.appendChild(lf);
      var bl=document.createElement('div');bl.style.position='absolute';bl.style.bottom=t.stemH+'px';bl.style.left='50%';bl.style.transform='translateX(-50%)';f.appendChild(bl);
      buildBloom(bl,t);return f;
    }
    function buildBloom(c,t){
      getBloomPos(t.shape).forEach(function(p){
        var d=document.createElement('div');d.className='petal';
        d.style.background=p.ic?(t.center||t.color):t.color;
        d.style.left=p.x+'px';d.style.top=p.y+'px';
        if(p.w)d.style.width=p.w+'px';if(p.h)d.style.height=p.h+'px';
        c.appendChild(d);
      });
    }
    function getBloomPos(s){
      switch(s){
        case'tulip':return[{x:-7,y:-2,w:6,h:9},{x:-2,y:-5,w:6,h:10},{x:3,y:-2,w:6,h:9}];
        case'rose':return[{x:-5,y:-3,w:6,h:6},{x:1,y:-3,w:6,h:6},{x:-2,y:-8,w:6,h:6},{x:-2,y:-3,w:5,h:5,ic:1}];
        case'daisy':return[{x:-3,y:-10,w:7,h:7},{x:-9,y:-5,w:7,h:7},{x:3,y:-5,w:7,h:7},{x:-3,y:0,w:7,h:7},{x:-3,y:-5,w:7,h:7,ic:1}];
        case'sunflower':return[{x:-3,y:-12,w:7,h:7},{x:-9,y:-7,w:7,h:7},{x:4,y:-7,w:7,h:7},{x:-3,y:-1,w:7,h:7},{x:-7,y:-10,w:7,h:7},{x:2,y:-10,w:7,h:7},{x:-3,y:-7,w:8,h:8,ic:1}];
        case'bell':return[{x:-2,y:-8,w:6,h:5},{x:-4,y:-4,w:9,h:4},{x:-5,y:0,w:11,h:4}];
        case'spike':return[{x:-2,y:-14,w:5,h:5},{x:-2,y:-9,w:5,h:5},{x:-2,y:-4,w:5,h:5},{x:-2,y:0,w:5,h:5}];
        case'pom':return[{x:-7,y:-7,w:6,h:6},{x:-1,y:-7,w:6,h:6},{x:4,y:-7,w:6,h:6},{x:-7,y:-1,w:6,h:6},{x:-1,y:-1,w:6,h:6},{x:4,y:-1,w:6,h:6}];
        case'star':return[{x:-3,y:-11,w:7,h:7},{x:-9,y:-5,w:7,h:7},{x:3,y:-5,w:7,h:7},{x:-6,y:0,w:7,h:7},{x:0,y:0,w:7,h:7},{x:-3,y:-5,w:6,h:6,ic:1}];
        case'orchid':return[{x:-3,y:-9,w:7,h:5},{x:-7,y:-4,w:6,h:7},{x:3,y:-4,w:6,h:7},{x:-2,y:-4,w:5,h:5,ic:1}];
        case'ruffle':return[{x:-7,y:-8,w:6,h:6},{x:-1,y:-10,w:6,h:6},{x:4,y:-7,w:6,h:6},{x:-5,y:-2,w:6,h:6},{x:1,y:-3,w:6,h:6}];
        case'trumpet':return[{x:-7,y:-8,w:6,h:6},{x:-1,y:-10,w:6,h:6},{x:4,y:-7,w:6,h:6},{x:-7,y:-2,w:6,h:6},{x:4,y:-2,w:6,h:6},{x:-2,y:-6,w:7,h:7,ic:1}];
        case'round':return[{x:-5,y:-5,w:7,h:7},{x:1,y:-5,w:7,h:7},{x:-5,y:1,w:7,h:7},{x:1,y:1,w:7,h:7}];
        default:return[{x:-3,y:-5,w:7,h:7}];
      }
    }

    // Grass
    (function(){var g=document.getElementById('grass-layer');for(var i=0;i<90;i++){var b=document.createElement('div');b.className='grass-blade';b.style.left=(i*1.1)+'%';b.style.height=(6+Math.random()*10)+'px';b.style.animation='grassSway '+(2+Math.random()*2)+'s ease-in-out infinite';b.style.animationDelay=(Math.random()*2)+'s';var s=Math.random();b.style.background=s<0.33?'linear-gradient(to top,#2e7d32,#4caf50)':s<0.66?'linear-gradient(to top,#388e3c,#66bb6a)':'linear-gradient(to top,#33691e,#7cb342)';g.appendChild(b);}})();

    var scene=document.getElementById('scene');

    // Birds
    function spawnBird(){var b=document.createElement('div');b.className='bird';var fl=Math.random()>0.5,sx=fl?-30:scene.offsetWidth+30,ex=fl?scene.offsetWidth+30:-30,y=5+Math.random()*18;b.style.top=y+'%';b.style.left=sx+'px';b.innerHTML='<div class="wing wing-left"></div><div class="wing wing-right"></div><div class="b-body"></div>';scene.appendChild(b);var d=4000+Math.random()*4000,st=performance.now();function m(ts){var p=(ts-st)/d;if(p>=1){b.remove();return;}b.style.left=(sx+(ex-sx)*p)+'px';b.style.top=(parseFloat(y)+Math.sin(p*Math.PI*4)*1.5)+'%';requestAnimationFrame(m);}requestAnimationFrame(m);}
    function schBirds(){spawnBird();setTimeout(schBirds,3000+Math.random()*5000);}
    setTimeout(schBirds,1500);

    // Butterflies
    function spawnBF(){var bf=document.createElement('div');bf.className='butterfly';var cs=['#ffeb3b','#ff9800','#e91e63','#9c27b0','#03a9f4'],c=cs[Math.floor(Math.random()*cs.length)];bf.innerHTML='<div class="b-wing b-wing-left" style="background:'+c+'"></div><div class="b-wing b-wing-right" style="background:'+c+'"></div><div class="b-body"></div>';var bx=15+Math.random()*65,by=35+Math.random()*25;bf.style.left=bx+'%';bf.style.top=by+'%';scene.appendChild(bf);var a=Math.random()*Math.PI*2,st=performance.now(),l=5000+Math.random()*5000;function m(ts){if(ts-st>l){bf.remove();return;}a+=(Math.random()-0.5)*0.1;bx+=Math.cos(a)*0.04;by+=Math.sin(a)*0.03;bx=Math.max(5,Math.min(88,bx));by=Math.max(25,Math.min(60,by));bf.style.left=bx+'%';bf.style.top=by+'%';requestAnimationFrame(m);}requestAnimationFrame(m);}
    function schBF(){spawnBF();setTimeout(schBF,7000+Math.random()*6000);}
    setTimeout(schBF,3000);

    // Sparkle
    var spkC=['#ffeb3b','#ff80ab','#e1bee7','#b3e5fc','#c8e6c9','#fff9c4','#f8bbd0','#fce4ec','#e8f5e9'];
    var lastSpk=0;
    function emitSparkle(xP){var n=performance.now();if(n-lastSpk<80)return;lastSpk=n;for(var i=0;i<3;i++){var s=document.createElement('div');s.className='sparkle';var col=spkC[Math.floor(Math.random()*spkC.length)];if(Math.random()>0.4){var sym=['?','?','?','?','·'][Math.floor(Math.random()*5)];s.textContent=sym;s.style.color=col;s.style.fontSize=(8+Math.random()*6)+'px';s.style.textShadow='0 0 3px '+col;}else{s.innerHTML='<div class="sparkle-dot" style="background:'+col+';color:'+col+'"></div>';}s.style.left=(xP+2+(Math.random()-0.5)*6)+'%';s.style.bottom=(22+Math.random()*3)+'%';scene.appendChild(s);setTimeout(function(){s.remove();},800);}}

    // Main
    var dayCount=getDayCount();
    if(dayCount>500)dayCount = 500
    
 
    var flowerBed=document.getElementById('flower-bed');
    var dayCounter=document.getElementById('day-counter');
    var boy=document.getElementById('boy');
    var girl=document.getElementById('girl');
    var hugBtn=document.getElementById('hug-btn');
    var hugMob=document.getElementById('hug-mob');

    dayCounter.textContent='Day '+dayCount+' — '+dayCount+(dayCount===1?' flower':' flowers');

    function calcFX(i){var sw=scene.offsetWidth||400;return sw*0.08+seededRandom(i+42)*sw*0.82;}
    function calcFY(i){return seededRandom(i+99)*60;}
    function placeFlowers(){for(var i=0;i<dayCount-1;i++){var f=createFlower(i,calcFX(i));var yOff=calcFY(i);f.style.bottom=yOff+'%';var sc=0.6+seededRandom(i+77)*0.4;f.style.transform='scale('+sc+')';f.style.zIndex=Math.floor(yOff);flowerBed.appendChild(f);}}
    placeFlowers();

    function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}
    function animWalk(el,f,t,dur){return new Promise(function(res){var s=performance.now(),legs=el.querySelectorAll('.leg');function st(ts){var p=Math.min((ts-s)/dur,1),e=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;el.style.left=(f+(t-f)*e)+'%';var lp=Math.floor(ts/150)%2;if(legs.length>=2){legs[0].style.transform=lp?'rotate(5deg)':'rotate(-5deg)';legs[1].style.transform=lp?'rotate(-5deg)':'rotate(5deg)';}if(p<1)requestAnimationFrame(st);else{legs.forEach(function(l){l.style.transform='';});res();}}requestAnimationFrame(st);});}

    function spawnHearts(x,y,n){for(var i=0;i<n;i++){var h=document.createElement('div');h.className='heart';h.textContent='?';h.style.left=(x+(Math.random()-0.5)*6)+'%';h.style.top=(y+Math.random()*3)+'%';h.style.animationDelay=(i*0.12)+'s';h.style.color=i%2?'#e91e63':'#ff5722';scene.appendChild(h);setTimeout(function(){h.remove();},1400);}}

    // Face system
    var GRIN_D=12,boyPct=48,isHugging=false;
    var boyMouth=boy.querySelector('.mouth'),girlMouth=girl.querySelector('.mouth');

    function getDist(){return Math.abs(girlState.x-boyPct);}

    function updateFaces(){
      if(isHugging)return;
      var d=getDist(),close=d<GRIN_D;
      boyMouth.className='mouth '+(close?'mouth-grin':'mouth-smile');
      girlMouth.className='mouth '+(close?'mouth-grin':'mouth-smile');
      boy.querySelectorAll('.blush').forEach(function(b){b.style.opacity=close?'1':'0.4';});
      girl.querySelectorAll('.blush').forEach(function(b){b.style.opacity=close?'1':'0.4';});
      var canHug=d<8;
      hugBtn.style.display=canHug?'block':'none';
      if(canHug)hugMob.classList.add('visible');else hugMob.classList.remove('visible');
    }

    // HUG - looks like a hug (move together, no hearts)
    async function doHug(){
      if(isHugging||!controlsEnabled)return;
      isHugging=true;
      hugBtn.style.display='none';hugMob.classList.remove('visible');

      // Move girl toward boy to overlap slightly
      var targetX=boyPct+2;
      girl.classList.add('hugging');
      girl.style.left=targetX+'%';
      girlState.x=targetX;

      await delay(300);

      // Both go shy
      boy.classList.add('shy');girl.classList.add('shy');
      boyMouth.className='mouth mouth-shy';
      girlMouth.className='mouth mouth-shy';

      // Arms overlap (simulate hug pose)
      boy.querySelector('.right-arm').style.transform='rotate(-15deg)';
      girl.querySelector('.left-arm').style.transform='rotate(15deg)';

      // Small floating hearts above their heads
      var midX=(boyPct+girlState.x)/2+4;
      spawnHearts(midX,28,3);

      await delay(1000);

      // Return
      boy.querySelector('.right-arm').style.transform='';
      girl.querySelector('.left-arm').style.transform='';
      boy.classList.remove('shy');girl.classList.remove('shy');
      girl.classList.remove('hugging');
      isHugging=false;
      updateFaces();
    }

    hugBtn.addEventListener('click',doHug);
    hugBtn.addEventListener('touchstart',function(e){e.preventDefault();doHug();});
    hugMob.addEventListener('touchstart',function(e){e.preventDefault();doHug();});
    document.addEventListener('keydown',function(e){if(e.code==='KeyH'&&getDist()<8)doHug();});

    var controlsEnabled=false;

    function createBouquet(){
      var bq=document.createElement('div');
      bq.style.position='relative';bq.style.width='30px';bq.style.height='36px';
      var wrapDiv=document.createElement('div');
      wrapDiv.style.cssText='position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:18px;height:12px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:1px solid #66bb6a;border-radius:0 0 6px 6px;';
      bq.appendChild(wrapDiv);
      var bqTypes=[dayCount-1,(dayCount)%12,(dayCount+3)%12,(dayCount+7)%12];
      var offsets=[{x:-6,r:-12},{x:0,r:0},{x:6,r:10},{x:2,r:6}];
      for(var i=0;i<4;i++){
        var bf=createFlower(bqTypes[i],0);
        bf.style.position='absolute';bf.style.bottom='10px';bf.style.left=(12+offsets[i].x)+'px';
        bf.style.transform='rotate('+offsets[i].r+'deg) scale(0.6)';bf.style.transformOrigin='bottom center';
        bq.appendChild(bf);
      }
      return bq;
    }

    async function playIntro(){
      var fx=calcFX(dayCount-1);
      var bq=createBouquet();
      bq.style.position='absolute';bq.style.left='60%';bq.style.bottom='68%';bq.style.transform='scale(0.6)';
      boy.appendChild(bq);
      await delay(400);
      await animWalk(boy,-12,54,2000);
      await delay(250);
      boy.removeChild(bq);

      var msg=document.createElement('div');
      msg.className='msg-popup';msg.textContent='happy birthday cutie :)';
      scene.appendChild(msg);

      var gbq=createBouquet();
      gbq.style.position='absolute';gbq.style.top='38%';gbq.style.left='-16%';gbq.style.transform='scale(0.4)';gbq.style.opacity='0';gbq.style.transition='opacity 0.3s';
      girl.appendChild(gbq);
      await delay(30);gbq.style.opacity='1';await delay(350);

      spawnHearts(64,42,4);
      girl.classList.add('happy-jump');await delay(1100);girl.classList.remove('happy-jump');

      girl.removeChild(gbq);
      setTimeout(function(){msg.remove();},3000);
      var pf=createFlower(dayCount-1,fx);
      var pyOff=calcFY(dayCount-1);var psc=0.6+seededRandom(dayCount-1+77)*0.4;
      pf.style.bottom=pyOff+'%';pf.style.opacity='0';pf.style.transform='scale(0)';pf.style.transition='all 0.5s cubic-bezier(0.34,1.56,0.64,1)';
      flowerBed.appendChild(pf);await delay(30);
      pf.style.opacity='1';pf.style.transform='scale('+psc+')';await delay(400);

      await animWalk(boy,54,48,500);boyPct=48;
      controlsEnabled=true;
    }
    playIntro();

    // Girl movement
    var girlState={x:62,y:0,vy:0,jumping:false,facingRight:true,speed:0.55};
    var keys={},mobKeys={};

    document.addEventListener('keydown',function(e){if(!controlsEnabled)return;keys[e.code]=true;if(e.code==='Space'&&!girlState.jumping){girlState.vy=-2.2;girlState.jumping=true;}if(['ArrowLeft','ArrowRight','Space'].indexOf(e.code)!==-1)e.preventDefault();});
    document.addEventListener('keyup',function(e){keys[e.code]=false;});

    // Touch controls
    (function(){
      document.querySelectorAll('.dpad-btn').forEach(function(b){
        var d=b.getAttribute('data-dir');
        b.addEventListener('touchstart',function(e){e.preventDefault();if(d==='left')mobKeys.L=true;if(d==='right')mobKeys.R=true;});
        b.addEventListener('touchend',function(e){e.preventDefault();mobKeys.L=false;mobKeys.R=false;});
        b.addEventListener('touchcancel',function(){mobKeys.L=false;mobKeys.R=false;});
      });
      document.querySelector('.jump-btn').addEventListener('touchstart',function(e){e.preventDefault();if(controlsEnabled&&!girlState.jumping){girlState.vy=-2.2;girlState.jumping=true;}});
    })();

    function isK(c){return keys[c];}
    function isLeft(){return isK('ArrowLeft')||mobKeys.L;}
    function isRight(){return isK('ArrowRight')||mobKeys.R;}

    function gameLoop(){
      if(controlsEnabled&&!isHugging){
        var w=false;
        if(isLeft()){girlState.x-=girlState.speed;w=true;if(girlState.facingRight){girlState.facingRight=false;girl.style.transform='scaleX(-1)';}}
        if(isRight()){girlState.x+=girlState.speed;w=true;if(!girlState.facingRight){girlState.facingRight=true;girl.style.transform='scaleX(1)';}}
        girlState.x=Math.max(0,Math.min(girlState.x,90));
        if(girlState.jumping){girlState.vy+=0.12;girlState.y+=girlState.vy;if(girlState.y>=0){girlState.y=0;girlState.jumping=false;girlState.vy=0;}}
        girl.style.left=girlState.x+'%';girl.style.bottom=(22-girlState.y)+'%';
        var legs=girl.querySelectorAll('.leg'),pt=girl.querySelector('.ponytail');
        if(w&&!girlState.jumping){var ph=Math.floor(performance.now()/150)%2;legs[0].style.transform=ph?'rotate(7deg)':'rotate(-7deg)';legs[1].style.transform=ph?'rotate(-7deg)':'rotate(7deg)';if(pt)pt.style.transform=ph?'rotate(4deg)':'rotate(-4deg)';emitSparkle(girlState.x);}
        else if(!girlState.jumping){legs[0].style.transform='';legs[1].style.transform='';if(pt)pt.style.transform='';}
        if(girlState.jumping&&pt)pt.style.transform=girlState.vy<0?'rotate(10deg)':'rotate(-6deg)';
        updateFaces();
      }
      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
